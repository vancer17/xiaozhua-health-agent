# 本地开发 override 示例
#
# 用法：
#   cp compose.override.example.yml compose.override.yml
#   docker compose up --build
#
# Docker Compose 会自动合并 compose.override.yml（无需 -f 参数）。
# compose.override.yml 已加入 .gitignore，避免个人路径/端口提交到仓库。
#
# 本文件提供：
# - assets/ 只读挂载（改 KB-TPL / 禁止词等后 restart 即生效，无需 rebuild）
#
# 若宿主机 8080 已被占用，请在 .env 中设置：
#   HEALTH_API_PUBLISH_PORT=18080

services:
  health-agent:
    volumes:
      - ./assets:/app/assets:ro

  eval-batch:
    volumes:
      - ./assets:/app/assets:ro
      - ./docs:/app/docs:ro
      - ./logs/eval:/app/logs/eval
