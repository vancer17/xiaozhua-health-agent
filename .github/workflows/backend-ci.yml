name: Backend CI

on:
  pull_request:

concurrency:
  group: backend-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Ruff format
        run: uv run ruff format --check src tests

      - name: Pytest
        run: uv run pytest

      - name: Milestone B regression (20 case hard gate)
        run: uv run python -m xiaozhua_health_agent.eval.batch_runner --mode milestone-b

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          tags: xiaozhua-health-agent:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test (readiness probe)
        run: |
          set -euo pipefail
          docker run -d --name health-agent-ci \
            -p 18080:8080 \
            -e XIAOZHUA_PROJECT_ROOT=/app \
            -e XIAOZHUA_PIPELINE_LLM_ENABLED=false \
            xiaozhua-health-agent:ci

          cleanup() {
            docker rm -f health-agent-ci >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for attempt in $(seq 1 30); do
            if curl -sf http://127.0.0.1:18080/internal/readyz; then
              echo
              echo "Readiness probe passed on attempt ${attempt}."
              exit 0
            fi
            sleep 1
          done

          echo "Readiness probe did not pass within 30s." >&2
          docker logs health-agent-ci >&2 || true
          exit 1
